# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Cap instances to manage costs during MVP phase
  maxInstances: 2
  minInstances: 0
  cpu: 1
  memoryMiB: 512

env:
  - variable: NODE_ENV
    value: production
  - variable: NEXT_PUBLIC_BASE_URL
    value: https://feeds.rankwithai.com

# Explicitly identify framework for the build pack
# App Hosting auto-detects Next.js, but explicit config ensures repeatable builds.
